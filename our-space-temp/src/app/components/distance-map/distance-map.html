<div class="map-card">

  <div class="map-head">
    <p class="same-sky">same sky, different clocks ♡</p>
    <h2 class="our-dist-title">our distance</h2>
    <p class="km-label">11,357 KM APART</p>
  </div>

  <div class="map-wrap">

    <!-- Save this file locally: download the SVG from Wikimedia and put it in assets/ -->
    <!-- https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg -->
    <img
      class="map-img"
      src="assets/world-map.svg"
      alt="world map"
    />

    <svg class="map-svg" viewBox="0 0 420 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr-send" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
          <path d="M0,0.5 L6,3.5 L0,6.5 Z" fill="#C85C8E"/>
        </marker>
        <marker id="arr-recv" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
          <path d="M0,0.5 L6,3.5 L0,6.5 Z" fill="#F4C6D7"/>
        </marker>
        <clipPath id="clip-ahm">
          <circle cx="318" cy="92" r="11"/>
        </clipPath>
        <clipPath id="clip-tor">
          <circle cx="108" cy="76" r="11"/>
        </clipPath>
      </defs>

      <!-- Sending arc: Ahmedabad → Toronto -->
      <path d="M 316,88 Q 215,18 110,73"
        fill="none" stroke="#C85C8E" stroke-width="1.8"
        stroke-dasharray="6,4" marker-end="url(#arr-send)" opacity="0.95"/>

      <!-- Receiving arc: Toronto → Ahmedabad -->
      <path d="M 112,80 Q 215,158 314,96"
        fill="none" stroke="#F4C6D7" stroke-width="1.8"
        stroke-dasharray="6,4" marker-end="url(#arr-recv)" opacity="0.95"/>

      <!-- Animated hearts -->
      <text id="heart-send" font-size="11" fill="#C85C8E" text-anchor="middle" dominant-baseline="middle">♥</text>
      <text id="heart-recv" font-size="11" fill="#F4C6D7" text-anchor="middle" dominant-baseline="middle">♥</text>

      <!-- Ahmedabad pin -->
      <circle cx="318" cy="92" r="13" fill="#ffffff" stroke="#E8A0BF" stroke-width="2"/>
      <image href="assets/smit.jpg" x="307" y="81" width="22" height="22"
        clip-path="url(#clip-ahm)" preserveAspectRatio="xMidYMid slice"/>
      <text x="318" y="96" font-size="9" fill="#D977A0" text-anchor="middle"
        font-family="Caveat,cursive" font-weight="700">S</text>
      <rect x="296" y="108" width="44" height="13" rx="6" fill="#FBE1EC" opacity="0.95"/>
      <text x="318" y="118" font-size="6.5" fill="#C85C8E" text-anchor="middle"
        font-family="Inter,sans-serif" font-weight="700">Ahmedabad</text>

      <!-- Toronto pin -->
      <circle cx="108" cy="76" r="13" fill="#ffffff" stroke="#E8A0BF" stroke-width="2"/>
      <image href="assets/pranami.jpg" x="97" y="65" width="22" height="22"
        clip-path="url(#clip-tor)" preserveAspectRatio="xMidYMid slice"/>
      <text x="108" y="80" font-size="9" fill="#D977A0" text-anchor="middle"
        font-family="Caveat,cursive" font-weight="700">P</text>
      <rect x="88" y="92" width="40" height="13" rx="6" fill="#FBE1EC" opacity="0.95"/>
      <text x="108" y="102" font-size="6.5" fill="#C85C8E" text-anchor="middle"
        font-family="Inter,sans-serif" font-weight="700">Toronto</text>
    </svg>
  </div>

  <div class="clock-bar">
    <div class="cc">
      <div class="city-name">AHMEDABAD</div>
      <div class="city-time" id="ahm-time">—</div>
      <div class="city-tz">IST · UTC +5:30</div>
    </div>
    <div class="mid-heart">
      <span class="heart-icon">♡</span>
      <span class="hrs-apart">9.5 hrs apart</span>
    </div>
    <div class="cc right">
      <div class="city-name">TORONTO</div>
      <div class="city-time" id="tor-time">—</div>
      <div class="city-tz">EDT · UTC −4:00</div>
    </div>
  </div>

</div>
